name: Linux CI

on: [pull_request]

jobs:
  build:
    name: ${{ matrix.name }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    container:
      image: borglab/gtsam-ci:${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.version }}

    env:
      CTEST_OUTPUT_ON_FAILURE: ON
      CTEST_PARALLEL_LEVEL: 2
      CMAKE_BUILD_TYPE: ${{ matrix.build_type }}

    strategy:
      fail-fast: true
      matrix:
        name: [ubuntu-24.04-gcc-14, ubuntu-24.04-clang-16]

        build_type: [Debug, Release]

        include:
          - name: ubuntu-24.04-gcc-14
            os: ubuntu-24.04
            compiler: gcc
            version: "14"

          - name: ubuntu-24.04-clang-16
            os: ubuntu-24.04
            compiler: clang
            version: "16"

    steps:
      # -------------------------
      # Checkout GPMP2
      # -------------------------
      - name: Checkout GPMP2
        uses: actions/checkout@v4

      # -------------------------
      # Build GTSAM (OFFICIAL CI WAY)
      # -------------------------
      - name: Build GTSAM
        run: |
          set -e

          git clone --depth 1 https://github.com/borglab/gtsam.git /tmp/gtsam_source
          cd /tmp/gtsam_source

          mkdir build && cd build

          cmake .. \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DGTSAM_ALLOW_DEPRECATED_SINCE_V43=OFF \
            -DGTSAM_WITH_TBB=OFF \
            -DGTSAM_BUILD_UNSTABLE=OFF \
            -DGTSAM_BUILD_EXAMPLES_ALWAYS=OFF \
            -DGTSAM_BUILD_TESTS=OFF

          make -j$(nproc)
          make install
          ldconfig

      # -------------------------
      # Build GPMP2
      # -------------------------
      - name: Configure GPMP2
        run: |
          mkdir build

      - name: Configure
        working-directory: ./build
        run: |
          cmake .. \
            -DGTSAM_BUILD_WITH_MARCH_NATIVE=OFF

      - name: Build
        working-directory: ./build
        run: |
          make -j$(nproc)

      - name: Test
        working-directory: ./build
        run: |
          ctest --output-on-failure
