name: Linux CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }} ${{ matrix.build_type }}

    runs-on: ${{ matrix.os }}

    container:
      image: borglab/gtsam-ci:${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.version }}
      env:
        CMAKE_BUILD_TYPE: ${{ matrix.build_type }}

    strategy:
      fail-fast: true
      matrix:
        name: [ubuntu-22.04-gcc-11, ubuntu-24.04-gcc-14]

        build_type: [Debug, Release]

        include:
          - name: ubuntu-22.04-gcc-11
            os: ubuntu-22.04
            compiler: gcc
            version: "11"

          - name: ubuntu-24.04-gcc-14
            os: ubuntu-24.04
            compiler: gcc
            version: "14"

    steps:
      # -------------------------
      # Checkout GPMP2
      # -------------------------
      - name: Checkout GPMP2
        uses: actions/checkout@v4

      # -------------------------
      # Install minimal missing tools
      # -------------------------
      - name: Install git (container is minimal)
        run: |
          apt-get update
          apt-get install -y git ca-certificates

      # -------------------------
      # Build and install GTSAM (CI-consistent)
      # -------------------------
      - name: Build GTSAM
        run: |
          set -e

          # shallow clone for speed
          git clone --depth 1 https://github.com/borglab/gtsam.git /tmp/gtsam

          cd /tmp/gtsam
          mkdir build && cd build

          cmake .. \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DGTSAM_BUILD_UNSTABLE=OFF \
            -DGTSAM_WITH_TBB=OFF \
            -DGTSAM_BUILD_EXAMPLES_ALWAYS=OFF \
            -DGTSAM_BUILD_TESTS=OFF

          make -j$(nproc)
          make install
          ldconfig

      # -------------------------
      # Build GPMP2
      # -------------------------
      - name: Build GPMP2
        run: |
          mkdir build && cd build

          cmake .. \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DGTSAM_BUILD_WITH_MARCH_NATIVE=OFF

          make -j$(nproc)

      # -------------------------
      # Run tests
      # -------------------------
      - name: Test
        run: |
          cd build
          ctest --output-on-failure
